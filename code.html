<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Scriptum · 全能句卡</title>

<!-- 预连接 Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- 加载字体，使用 font-display: swap 减少闪烁 -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* 字体降级方案 */
.font-fallback {
  font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', sans-serif !important;
}
.font-fallback .brand,
.font-fallback .text-en,
.font-fallback .card-tag,
.font-fallback .feedback-title {
  font-family: 'Georgia', 'Times New Roman', serif !important;
}
:root{
  --paper:#efe1b8;
  --paper-hi:#f6ecca;
  --paper-lo:#d8c493;
  --ink:#3a2817;
  --ink-soft:#6e5232;
  --accent:#9c3a23;
  --gold:#a87f3c;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'Noto Serif SC',serif;user-select:none;-webkit-user-select:none;}
body{
  background:radial-gradient(ellipse at 50% 0%,#3d2a18 0%,#1c1207 80%);
  color:#e8d4a8;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background-image:
    repeating-linear-gradient(92deg,rgba(0,0,0,0.05) 0,transparent 2px,transparent 70px,rgba(0,0,0,0.05) 72px),
    repeating-linear-gradient(180deg,rgba(255,200,150,0.02) 0,transparent 4px);
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 50% 60%,transparent 30%,rgba(0,0,0,0.55) 100%);
}
.app{
  position:relative;height:100vh;height:100dvh;
  display:flex;flex-direction:column;
  max-width:480px;margin:0 auto;
}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(env(safe-area-inset-top) + 16px) 26px 6px;z-index:10;
}
.brand{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:24px;letter-spacing:.18em;color:#f0e0b8;
}
.brand .dot{color:var(--gold);}
.brand .sub{
  display:block;font-style:normal;font-size:10px;letter-spacing:.4em;
  color:#a89070;margin-top:2px;
}
.stats{
  font-family:'Cormorant Garamond',serif;font-size:13px;
  letter-spacing:.18em;color:#a89070;text-align:right;
}
.stats b{color:var(--gold);font-weight:600;font-size:20px;margin:0 2px;font-style:italic;}
.stats .lbl{display:block;font-size:9px;letter-spacing:.35em;margin-top:2px;}

.tabs{
  display:flex;justify-content:center;gap:24px;
  padding:6px 20px 16px;z-index:10;
}
.tab{
  font-family:'Cormorant Garamond',serif;font-size:14px;
  background:none;border:none;color:#a89070;
  cursor:pointer;letter-spacing:.12em;position:relative;
  padding-bottom:6px;transition:color .3s;
}
.tab.active{color:#f0e0b8;}
.tab.active::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:var(--gold);
}
.tab:active{transform:scale(.96);}

.deck{
  flex:1;position:relative;
  display:flex;align-items:center;justify-content:center;
  padding:10px 30px 20px;perspective:1400px;
  transition:opacity .3s;
}
.card{
  position:absolute;
  width:100%;max-width:360px;
  height:74%;max-height:540px;
  border-radius:7px;
  background:radial-gradient(circle at 18% 22%,#f6ecca,#e8d8a4 60%,#d4bf85 100%);
  padding:40px 30px 78px;
  display:flex;flex-direction:column;
  cursor:pointer;will-change:transform,opacity;
  transform-style:preserve-3d;
  box-shadow:
    0 1px 0 rgba(255,255,255,.4) inset,
    0 -1px 0 rgba(120,80,30,.15) inset,
    0 2px 4px rgba(0,0,0,.2),
    0 14px 28px -8px rgba(0,0,0,.45),
    0 30px 60px -18px rgba(0,0,0,.6);
}
.card .noise{
  position:absolute;inset:0;border-radius:7px;pointer-events:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' seed='7'/><feColorMatrix values='0 0 0 0 0.3 0 0 0 0 0.2 0 0 0 0 0.08 0 0 0 0.55 0'/></filter><rect width='220' height='220' filter='url(%23n)' opacity='0.5'/></svg>");
  mix-blend-mode:multiply;opacity:.45;z-index:1;
}
.card .creases{
  position:absolute;inset:0;border-radius:7px;pointer-events:none;z-index:1;
  background-image:
    linear-gradient(115deg,transparent 49.6%,rgba(110,75,30,.08) 49.8%,rgba(110,75,30,.08) 50.1%,transparent 50.3%),
    linear-gradient(70deg,transparent 29.7%,rgba(110,75,30,.06) 29.85%,rgba(110,75,30,.06) 30.05%,transparent 30.2%),
    linear-gradient(20deg,transparent 73%,rgba(110,75,30,.05) 73.1%,transparent 73.3%);
}
.card .edge{
  position:absolute;inset:0;border-radius:7px;pointer-events:none;z-index:3;
  box-shadow:
    inset 0 0 0 1px rgba(168,127,60,.35),
    inset 0 0 22px rgba(140,90,40,.18),
    inset 0 0 70px rgba(120,70,30,.1),
    inset 0 0 0 6px rgba(255,245,210,.08);
}
.corner{position:absolute;width:28px;height:28px;border:1px solid rgba(168,127,60,.45);z-index:4;pointer-events:none;}
.corner.tl{top:13px;left:13px;border-right:none;border-bottom:none;}
.corner.tr{top:13px;right:13px;border-left:none;border-bottom:none;}
.corner.bl{bottom:13px;left:13px;border-right:none;border-top:none;}
.corner.br{bottom:13px;right:13px;border-left:none;border-top:none;}

.card-content{position:relative;z-index:5;flex:1;display:flex;flex-direction:column;justify-content:center;}
.card-tag{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:13px;letter-spacing:.22em;color:var(--gold);
  text-transform:uppercase;margin-bottom:6px;
}
.card-index{
  font-family:'Cormorant Garamond',serif;font-size:11px;
  color:var(--ink-soft);letter-spacing:.25em;margin-bottom:24px;
}

.text-en{
  font-family:'Cormorant Garamond',serif;
  font-size:26px;line-height:1.42;color:var(--ink);
  font-weight:500;
}
.text-zh{
  font-family:'Noto Serif SC',serif;
  font-size:19px;line-height:1.6;color:var(--ink-soft);
}
.primary{transition:margin-bottom .5s ease;}
.card.show-sub .primary{margin-bottom:18px;}
.secondary{
  padding-top:18px;
  border-top:1px solid rgba(139,90,40,.25);
  max-height:0;overflow:hidden;opacity:0;transform:translateY(10px);
  transition:max-height .55s cubic-bezier(.2,.7,.2,1),opacity .4s,transform .5s;
}
.card.show-sub .secondary{max-height:280px;opacity:1;transform:translateY(0);}

.hint{
  position:absolute;bottom:18px;left:0;right:0;text-align:center;
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:11.5px;color:var(--ink-soft);letter-spacing:.22em;
  opacity:.55;z-index:5;
}
.fav-mark{
  position:absolute;top:18px;right:20px;width:20px;height:20px;
  color:var(--accent);opacity:0;transform:scale(.4) rotate(-30deg);
  transition:all .45s cubic-bezier(.3,1.6,.5,1);z-index:6;
}
.card.favorited .fav-mark{opacity:.85;transform:scale(1) rotate(-12deg);}
.card[data-pos="0"]{transform:translateY(0) rotate(0);z-index:5;}
.card[data-pos="1"]{transform:translateY(15px) scale(.96) rotate(-1.8deg);z-index:4;opacity:.88;}
.card[data-pos="2"]{transform:translateY(28px) scale(.92) rotate(2.2deg);z-index:3;opacity:.6;}
.card[data-pos="3"]{transform:translateY(40px) scale(.88) rotate(-1.2deg);z-index:2;opacity:.32;}
.card-anim{transition:transform .55s cubic-bezier(.2,.7,.2,1),opacity .55s;}
.card.fly-left{animation:flyLeft .55s cubic-bezier(.4,0,.6,1) forwards;}
.card.fly-right{animation:flyRight .55s cubic-bezier(.4,0,.6,1) forwards;}
.card.fly-up-switch{animation:flyUpSwitch .55s cubic-bezier(.4,0,.6,1) forwards;}
.card.fly-in-left{animation:flyInLeft .5s cubic-bezier(.2,.7,.2,1) forwards;}
@keyframes flyLeft{to{transform:translateX(-160%) rotate(-22deg);opacity:0;}}
@keyframes flyRight{to{transform:translateX(160%) rotate(22deg);opacity:0;}}
@keyframes flyUpSwitch{to{transform:translateY(-160%) scale(.9) rotate(-5deg);opacity:0;}}
@keyframes flyInLeft{
  0%{transform:translateX(-130%) rotate(-18deg);opacity:0;}
  100%{transform:translateX(0) rotate(0);opacity:1;}
}
.bottom{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 40px calc(env(safe-area-inset-bottom) + 22px);z-index:10;
}
.nav-btn{
  width:46px;height:46px;border-radius:50%;
  border:1px solid rgba(232,212,168,.22);
  background:rgba(245,235,204,.04);color:#e8d4a8;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  backdrop-filter:blur(4px);transition:transform .2s,background .25s;
}
.nav-btn:active{transform:scale(.9);background:rgba(245,235,204,.13);}
.nav-btn svg{width:18px;height:18px;}
.fav-btn{
  width:62px;height:62px;border-radius:50%;
  border:1px solid rgba(168,127,60,.5);
  background:linear-gradient(145deg,rgba(168,127,60,.22),rgba(139,58,43,.18));
  color:var(--gold);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .3s;
  box-shadow:0 6px 24px rgba(168,127,60,.18),0 1px 0 rgba(255,240,200,.15) inset;
}
.fav-btn:active{transform:scale(.9);}
.fav-btn.active{
  background:linear-gradient(145deg,#c9492e,#7e2e1d);
  color:#f5ebcc;border-color:rgba(245,235,204,.4);
  box-shadow:0 0 28px rgba(201,73,46,.55),0 1px 0 rgba(255,220,180,.3) inset;
}
.fav-btn svg{width:26px;height:26px;}
.toast{
  position:fixed;bottom:118px;left:50%;
  transform:translateX(-50%) translateY(15px);
  background:rgba(30,20,10,.92);color:#f5ebcc;
  padding:9px 22px;border-radius:24px;font-size:13px;
  letter-spacing:.12em;opacity:0;pointer-events:none;
  transition:opacity .3s,transform .3s;z-index:100;
  border:1px solid rgba(168,127,60,.35);
  font-family:'Cormorant Garamond',serif;font-style:italic;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.collection-panel{
  position:fixed;inset:0;background:rgba(18,10,4,.88);
  backdrop-filter:blur(12px);z-index:200;
  opacity:0;pointer-events:none;transition:opacity .4s;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.collection-panel.show{opacity:1;pointer-events:auto;}
.collection-inner{max-width:480px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 30px) 24px 60px;}
.collection-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:26px;padding-bottom:14px;
  border-bottom:1px solid rgba(168,127,60,.25);
}
.collection-title{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:28px;letter-spacing:.12em;color:#f0e0b8;
}
.collection-title .n{color:var(--gold);font-size:18px;margin-left:8px;}
.collection-actions{display:flex;gap:10px;}
.close-btn{
  width:36px;height:36px;border-radius:50%;
  border:1px solid rgba(232,212,168,.3);background:transparent;
  color:#e8d4a8;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.feedback-btn{
  width:36px;height:36px;border-radius:50%;
  border:1px solid rgba(232,212,168,.3);background:transparent;
  color:#e8d4a8;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.feedback-btn:hover{background:rgba(232,212,168,.1);border-color:rgba(232,212,168,.5);}
.collection-list{display:flex;flex-direction:column;gap:14px;}
.collection-item{
  position:relative;overflow:hidden;
  background:radial-gradient(circle at 20% 20%,#f6ecca,#e3d09c 80%);
  border-radius:5px;padding:18px 20px;color:var(--ink);
  box-shadow:0 8px 22px rgba(0,0,0,.3);
  cursor:pointer; 
  transition: transform .2s;
}
.collection-item:active { transform: scale(0.98); }
.collection-item .noise{
  position:absolute;inset:0;pointer-events:none;opacity:.4;mix-blend-mode:multiply;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' seed='7'/><feColorMatrix values='0 0 0 0 0.3 0 0 0 0 0.2 0 0 0 0 0.08 0 0 0 0.55 0'/></filter><rect width='220' height='220' filter='url(%23n)' opacity='0.5'/></svg>");
}
.ci-main{font-size:16px;line-height:1.5;font-weight:500;position:relative;z-index:1;margin-bottom:8px;}
.ci-sub{font-size:13px;color:var(--ink-soft);line-height:1.5;position:relative;z-index:1;}
.ci-sub .by{color:var(--gold);font-style:italic;margin-left:4px;font-family:'Cormorant Garamond',serif;}
.ci-del{
  position:absolute;top:10px;right:12px;width:24px;height:24px;
  border:none;background:rgba(60,40,20,.12);border-radius:50%;
  color:var(--ink-soft);cursor:pointer;display:flex;align-items:center;justify-content:center;
  z-index:2;transition:background .2s;
}
.ci-del:active{background:rgba(156,58,35,.3);color:#fff;}
.collection-empty{
  text-align:center;color:#a89070;
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:17px;margin-top:90px;letter-spacing:.12em;line-height:1.8;
}
.collection-empty .s{display:block;font-size:11px;letter-spacing:.3em;margin-top:10px;color:#7a6347;}

/* 反馈面板 */
.feedback-panel{
  position:fixed;inset:0;background:rgba(18,10,4,.88);
  backdrop-filter:blur(12px);z-index:300;
  opacity:0;pointer-events:none;transition:opacity .3s;
  display:flex;align-items:center;justify-content:center;
}
.feedback-panel.show{opacity:1;pointer-events:auto;}
.feedback-inner{
  width:85%;max-width:320px;
  background:radial-gradient(circle at 20% 20%,#f6ecca,#e3d09c 80%);
  border-radius:8px;padding:30px 24px;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
  transform:scale(.9);transition:transform .3s;
}
.feedback-panel.show .feedback-inner{transform:scale(1);}
.feedback-content{text-align:center;color:var(--ink);}
.feedback-title{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:24px;letter-spacing:.12em;margin-bottom:12px;
}
.feedback-desc{font-size:14px;color:var(--ink-soft);margin-bottom:24px;line-height:1.5;}
.feedback-contact{
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-size:16px;color:var(--ink);margin-bottom:24px;
  padding:16px;background:rgba(168,127,60,.1);border-radius:6px;
  font-family:'Cormorant Garamond',serif;
}
.feedback-close{
  background:transparent;border:1px solid var(--ink-soft);
  color:var(--ink-soft);padding:10px 28px;border-radius:24px;
  font-size:13px;letter-spacing:.12em;cursor:pointer;
  transition:all .2s;font-family:'Cormorant Garamond',serif;
}
.feedback-close:hover{background:var(--ink-soft);color:#f5ebcc;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">Scriptum<span class="dot">.</span><span class="sub">ALL-IN-ONE CARDS</span></div>
    <div class="stats"><b id="curIdx">01</b>/<span id="totalIdx">27</span><span class="lbl">CARD</span></div>
  </div>
  
  <div class="tabs">
    <button class="tab active" data-module="articles">三篇文章</button>
    <button class="tab" data-module="exercises">单元练习</button>
    <button class="tab" data-module="zh_en">汉译英</button>

  <div class="deck" id="deck"></div>
  <div class="bottom">

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

      </svg>

      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.3l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.49L12 21.3z"/></svg>
    </button>
    <button class="nav-btn" id="prevBtn" aria-label="上一张">

<div class="toast" id="toast"></div>

          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
    </div>
    <div class="collection-list" id="collectionList"></div>
  </div>
</div>

<!-- 反馈弹窗 -->
<div class="feedback-panel" id="feedbackPanel">

<script>
const articlesData = [
  { en:"Though Linda had done her \"motherly\" duties, she didn't think she was a mom in a real sense.", cn:"尽管琳达已经尽到了她“母亲般的”职责，但她并不认为自己是真正意义上的母亲。", tag:"Article · Linda" },
  { en:"For years, Linda had been busy trying to run a \"perfect\" home and to survive her miserable marriage.", cn:"多年来，琳达一直忙着努力经营一个“完美的”家庭，艰难维系着她痛苦的婚姻。", tag:"Article · Linda" },
  { en:"She also tried hard to protect her daughter from her drunken husband's abuse.", cn:"她也竭力保护女儿，不让她受到醉酒丈夫的虐待。", tag:"Article · Linda" },
  { en:"But all her efforts proved in vain.", cn:"但她所有的努力都付诸东流。", tag:"Article · Linda" },
  { en:"Finally, she made a decision: to get a divorce and live alone with her daughter.", cn:"最终，她做了一个决定：离婚，和女儿单独生活。", tag:"Article · Linda" },
  { en:"In their new home, Linda and her daughter could have a calm, quiet dinner together for the first time.", cn:"在她们的新家，琳达和女儿第一次可以一起安安静静地吃晚餐。", tag:"Article · Linda" },
  { en:"When her daughter carelessly knocked over a glass of chocolate milk, Linda did not get angry but laughed together with her daughter.", cn:"当女儿不小心打翻了一杯巧克力牛奶时，琳达没有生气，反而和女儿一起笑了起来。", tag:"Article · Linda" },

const STORAGE_KEY = 'scriptum_allinone_v4';
const STATE_KEY = 'scriptum_state_v1';

// 保存当前状态
function saveState() {
  try {
    const state = {
      module: currentModule,
      index: currentIndex
    };
    localStorage.setItem(STATE_KEY, JSON.stringify(state));
  } catch (e) {
    console.warn('Failed to save state:', e);
  }
}

// 恢复状态，返回保存的索引
function restoreState() {
  try {
    const saved = localStorage.getItem(STATE_KEY);
    if (saved) {
      const state = JSON.parse(saved);
      // 恢复模块
      if (state.module && ['articles', 'exercises', 'zh_en'].includes(state.module)) {
        currentModule = state.module;
        // 更新tab高亮
        document.querySelectorAll('.tab').forEach(t => {
          t.classList.toggle('active', t.dataset.module === state.module);
        });
      }
      // 返回索引（后续会验证有效性）
      if (typeof state.index === 'number' && state.index >= 0) {
        return state.index;
      }
    }
  } catch (e) {
    console.warn('Failed to restore state:', e);
  }
  return 0;
}

let currentModule = 'articles';
let sentences = articlesData;
let currentIndex = 0;
let favorites = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let isAnimating = false;
let touchStart = null;
let touchMoved = false;
const SWIPE = 55;

// 恢复保存的索引和模块
currentIndex = restoreState();

// 根据恢复的模块设置对应的数据
if (currentModule === 'articles') sentences = articlesData;
else if (currentModule === 'exercises') sentences = exercisesData;
else if (currentModule === 'zh_en') sentences = zhEnData;

// 验证索引有效性（防止数据更新后越界）
const maxIndex = sentences.length - 1;
currentIndex = Math.min(currentIndex, maxIndex);

const $ = id => document.getElementById(id);
const deck = $('deck'), favBtn = $('favBtn'), toast = $('toast');
const curIdxEl = $('curIdx'), totalIdxEl = $('totalIdx');
totalIdxEl.textContent = String(sentences.length).padStart(2, '0');

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.classList.remove('show'), 1600);
}

const getFavId = (idx) => `${currentModule}_${idx}`;
const isFav = (idx) => favorites.includes(getFavId(idx));

function updateFavBtn() {
  favBtn.classList.toggle('active', isFav(currentIndex));
}

function createCard(idx, pos) {
  const s = sentences[idx];
  const card = document.createElement('div');
  card.className = 'card card-anim';
  card.dataset.pos = pos;
  card.dataset.idx = idx;
  if (isFav(idx)) card.classList.add('favorited');
  
  let primaryHTML, secondaryHTML;
  if (currentModule === 'zh_en') {
    primaryHTML = `<div class="primary text-zh">${s.zh}</div>`;
    secondaryHTML = `<div class="secondary text-en">${s.en}</div>`;
  } else {
    primaryHTML = `<div class="primary text-en">${s.en}</div>`;
    secondaryHTML = `<div class="secondary text-zh">${s.cn}</div>`;
  }

  card.innerHTML = `
    <div class="noise"></div>
    <div class="creases"></div>
    <div class="edge"></div>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <svg class="fav-mark" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.3l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.49L12 21.3z"/></svg>
    <div class="card-content">
      <div class="card-tag">— ${s.tag}</div>
      <div class="card-index">№ ${String(idx + 1).padStart(3, '0')} / ${String(sentences.length).padStart(3, '0')}</div>
      ${primaryHTML}
      ${secondaryHTML}
    </div>
    <div class="hint">tap to reveal · swipe <span class="h">♥</span> to collect</div>
  `;
  return card;
}

function renderDeck() {
  deck.innerHTML = '';
  for (let offset = 3; offset >= 0; offset--) {
    const idx = (currentIndex + offset) % sentences.length;
    if (offset > 0 && idx === currentIndex) continue;
    deck.appendChild(createCard(idx, offset));
  }
  updateFavBtn();
  curIdxEl.textContent = String(currentIndex + 1).padStart(2, '0');
  saveState(); // 确保每次渲染都保存状态
}

const topCard = () => deck.querySelector('.card[data-pos="0"]');

function nextCard(dir = 'right') {
  if (isAnimating) return;
  const top = topCard(); if (!top) return;
  isAnimating = true;
  top.classList.remove('card-anim');
  if (dir === 'right') top.classList.add('fly-right');
  else if (dir === 'left') top.classList.add('fly-left');
  else if (dir === 'up') top.classList.add('fly-up-switch');

  [...deck.querySelectorAll('.card')].filter(c => c !== top).forEach(c => {
    const p = parseInt(c.dataset.pos);
    if (p - 1 >= 0) c.dataset.pos = p - 1;
  });
  setTimeout(() => {
    currentIndex = (currentIndex + 1) % sentences.length;
    saveState(); // 保存切换后的索引
    renderDeck();
    isAnimating = false;
  }, 520);
}

function prevCard() {
  if (isAnimating) return;
  isAnimating = true;
  currentIndex = (currentIndex - 1 + sentences.length) % sentences.length;
  saveState(); // 保存切换后的索引
  renderDeck();
  const top = topCard();
  if (top) {
    top.classList.remove('card-anim');
    top.classList.add('fly-in-left');
    setTimeout(() => {
      top.classList.remove('fly-in-left');
      top.classList.add('card-anim');
      isAnimating = false;
    }, 500);
  } else {
    isAnimating = false;
  }
}

function toggleFav() {
  if (isAnimating) return;
  const top = topCard(); if (!top) return;
  const favId = getFavId(currentIndex);
  if (isFav(currentIndex)) {
    favorites = favorites.filter(i => i !== favId);
    top.classList.remove('favorited');
    favBtn.classList.remove('active');
    showToast('Removed from favorites');
  } else {
    favorites.push(favId);
    top.classList.add('favorited');
    favBtn.classList.add('active');
    showToast('Collected ♥');
    favBtn.animate(
      [{ transform: 'scale(.9)' }, { transform: 'scale(1.22)' }, { transform: 'scale(1)' }],
      { duration: 420, easing: 'cubic-bezier(.4,1.6,.5,1)' }
    );
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(favorites));
}

function favToHeart() {
  if (isAnimating) return;
  const top = topCard(); if (!top) return;
  const favId = getFavId(currentIndex);
  if (!isFav(currentIndex)) {
    favorites.push(favId);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(favorites));
  }
  isAnimating = true;
  
  // 计算飞向爱心的位移
  const heartRect = favBtn.getBoundingClientRect();
  const cardRect = top.getBoundingClientRect();
  const dx = (heartRect.left + heartRect.width / 2) - (cardRect.left + cardRect.width / 2);
  const dy = (heartRect.top + heartRect.height / 2) - (cardRect.top + cardRect.height / 2);

  top.classList.remove('card-anim');
  
  // 后面的卡片往前推
  [...deck.querySelectorAll('.card')].filter(c => c !== top).forEach(c => {
    const p = parseInt(c.dataset.pos);
    if (p - 1 >= 0) c.dataset.pos = p - 1;
  });

  // 执行飞入爱心动画
  const anim = top.animate([
    { transform: 'translate(0, 0) scale(1) rotate(0deg)', opacity: 1 },
    { transform: `translate(${dx * 0.3}px, ${dy * 0.3}px) scale(0.6) rotate(5deg)`, opacity: 0.8, offset: 0.4 },
    { transform: `translate(${dx}px, ${dy}px) scale(0.05) rotate(15deg)`, opacity: 0 }
  ], {
    duration: 600,
    easing: 'cubic-bezier(0.4, 0.0, 0.6, 1)' 
  });
  
  // 爱心按钮吸收反馈动画
  setTimeout(() => {
     favBtn.animate([
        { transform: 'scale(1)' },
        { transform: 'scale(1.4) rotate(-10deg)' },
        { transform: 'scale(0.9)' },
        { transform: 'scale(1.15) rotate(5deg)' },
        { transform: 'scale(1)' }
     ], { duration: 400, easing: 'ease-out' });
     showToast('Collected ♥');
  }, 300);

  anim.onfinish = () => {
    currentIndex = (currentIndex + 1) % sentences.length;
    saveState(); // 保存切换后的索引
    renderDeck();
    isAnimating = false;
  };
}

deck.addEventListener('touchstart', e => {
  if (isAnimating) return;
  const t = e.touches[0];
  touchStart = { x: t.clientX, y: t.clientY, t: Date.now() };
  touchMoved = false;
}, { passive: true });

deck.addEventListener('touchmove', e => {
  if (!touchStart || isAnimating) return;
  const t = e.touches[0];
  const dx = t.clientX - touchStart.x;
  const dy = t.clientY - touchStart.y;
  if (Math.abs(dx) > 6 || Math.abs(dy) > 6) touchMoved = true;
  const top = topCard(); if (!top) return;
  const ax = Math.abs(dx), ay = Math.abs(dy);
  
  if (ax > ay && ax > 8) { // 左右滑动
    top.style.transition = 'none';
    top.style.transform = `translateX(${dx}px) rotate(${dx * 0.06}deg)`;
    top.style.opacity = String(Math.max(.3, 1 - ax / 380));
  } else if (ay > ax) { // 上下滑动
    top.style.transition = 'none';
    if (dy < -8) { // 上滑切换
      top.style.transform = `translateY(${dy}px) scale(${1 + dy/1000}) rotate(${dx * 0.02}deg)`;
      top.style.opacity = String(Math.max(.3, 1 + dy/500));
    } else if (dy > 8) { // 下滑收藏
      top.style.transform = `translateY(${dy}px) scale(${1 - dy/800}) rotate(${dx * 0.02}deg)`;
      top.style.opacity = String(Math.max(.3, 1 - dy/500));
    }
  }
}, { passive: true });

deck.addEventListener('touchend', e => {
  if (!touchStart || isAnimating) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStart.x;
  const dy = t.clientY - touchStart.y;
  const dt = Date.now() - touchStart.t;
  touchStart = null;
  const top = topCard(); if (!top) return;
  top.style.transition = '';
  top.style.transform = '';
  top.style.opacity = '';
  const ax = Math.abs(dx), ay = Math.abs(dy);

  if (ax > SWIPE && ax > ay) { nextCard(dx > 0 ? 'left' : 'right'); return; }
  if (dy < -SWIPE && ay > ax) { nextCard('up'); return; } // 上滑切换
  if (dy > SWIPE && ay > ax) { favToHeart(); return; }    // 下滑收藏
  
  if (!touchMoved && dt < 300 && top.dataset.pos === '0') {
    top.classList.toggle('show-sub');
  }
});

favBtn.addEventListener('click', toggleFav);
$('prevBtn').addEventListener('click', prevCard);

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    if (isAnimating) return;
    const mod = tab.dataset.module;
    if (mod === currentModule) return;

    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');

    currentModule = mod;
    if (mod === 'articles') sentences = articlesData;
    else if (mod === 'exercises') sentences = exercisesData;
    else if (mod === 'zh_en') sentences = zhEnData;

    currentIndex = 0;
    totalIdxEl.textContent = String(sentences.length).padStart(2, '0');

    saveState(); // 保存模块切换状态

    deck.style.opacity = '0';
    setTimeout(() => {
      renderDeck();
      deck.style.opacity = '1';
    }, 200);
  });
});

$('collectionBtn').addEventListener('click', () => {
  renderCollection();
  $('collectionPanel').classList.add('show');
});

$('closeCollection').addEventListener('click', () => {
  $('collectionPanel').classList.remove('show');
});

// 反馈功能
$('feedbackBtn').addEventListener('click', () => {
  $('feedbackPanel').classList.add('show');
});

$('feedbackClose').addEventListener('click', () => {
  $('feedbackPanel').classList.remove('show');
});

// 点击背景关闭反馈面板
$('feedbackPanel').addEventListener('click', (e) => {
  if (e.target === $('feedbackPanel')) {
    $('feedbackPanel').classList.remove('show');
  }
});

function renderCollection() {
  $('favCount').textContent = favorites.length ? `(${favorites.length})` : '';
  const list = $('collectionList');
  if (favorites.length === 0) {
    list.innerHTML = '<div class="collection-empty">No favorites yet.<span class="s">SWIPE UP TO COLLECT</span></div>';
    return;
  }
  const items = favorites.map(favId => {
    const [mod, idxStr] = favId.split('_');
    const idx = parseInt(idxStr);
    let data, mainText, subText;
    if (mod === 'articles') { data = articlesData[idx]; mainText = data.en; subText = data.cn; }
    else if (mod === 'exercises') { data = exercisesData[idx]; mainText = data.en; subText = data.cn; }
    else { data = zhEnData[idx]; mainText = data.zh; subText = data.en; }
    return { favId, tag: data.tag, mainText, subText, mod };
  });

  list.innerHTML = items.map(s => `
    <div class="collection-item" data-id="${s.favId}">
      <div class="noise"></div>
      <button class="ci-del" data-id="${s.favId}" aria-label="移除">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
      <div class="ci-main ${s.mod === 'zh_en' ? 'text-zh' : 'text-en'}">${s.mainText}</div>
      <div class="ci-sub ${s.mod === 'zh_en' ? 'text-en' : 'text-zh'}">${s.subText} <span class="by">— ${s.tag}</span></div>
    </div>
  `).join('');

  list.querySelectorAll('.collection-item').forEach(item => {
    item.addEventListener('click', (e) => {
      if (e.target.closest('.ci-del')) return; 
      const id = item.dataset.id;
      const [mod, idxStr] = id.split('_');
      const idx = parseInt(idxStr);
      
      if (mod !== currentModule) {
        document.querySelectorAll('.tab').forEach(t => {
          t.classList.toggle('active', t.dataset.module === mod);
        });
        currentModule = mod;
        if (mod === 'articles') sentences = articlesData;
        else if (mod === 'exercises') sentences = exercisesData;
        else if (mod === 'zh_en') sentences = zhEnData;
        totalIdxEl.textContent = String(sentences.length).padStart(2, '0');
      }
      
      currentIndex = idx;
      renderDeck();
      $('collectionPanel').classList.remove('show');
    });
  });

  list.querySelectorAll('.ci-del').forEach(b => {
    b.addEventListener('click', e => {
      e.stopPropagation(); 
      const id = b.dataset.id;
      favorites = favorites.filter(x => x !== id);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(favorites));
      renderCollection();
      renderDeck();
      showToast('Removed');
    });
  });
}

document.addEventListener('keydown', e => {
  if ($('collectionPanel').classList.contains('show')) return;
  if (e.key === 'ArrowRight') { e.preventDefault(); nextCard('right'); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); prevCard(); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); nextCard('up'); }      // 键盘上：切换
  else if (e.key === 'ArrowDown') { e.preventDefault(); favToHeart(); }     // 键盘下：收藏
  else if (e.key === ' ') { e.preventDefault(); topCard()?.classList.toggle('show-sub'); }
  else if (e.key === 'f' || e.key === 'F') { toggleFav(); }
});

renderDeck();

// 检测字体加载状态，失败则添加降级类
document.fonts.ready.then(() => {
  // 检测核心字体是否加载成功
  const cormorantLoaded = document.fonts.check('24px "Cormorant Garamond"');
  const notoSerifLoaded = document.fonts.check('24px "Noto Serif SC"');

  // 如果任一核心字体加载失败，添加降级类
  if (!cormorantLoaded || !notoSerifLoaded) {
    document.body.classList.add('font-fallback');
  }
});

// 超时保护：3秒后如果字体还没加载，强制降级
setTimeout(() => {
  if (!document.body.classList.contains('font-fallback')) {
    const cormorantLoaded = document.fonts.check('24px "Cormorant Garamond"');
    const notoSerifLoaded = document.fonts.check('24px "Noto Serif SC"');
    if (!cormorantLoaded || !notoSerifLoaded) {
      document.body.classList.add('font-fallback');
    }
  }
}, 3000);
</script>
